name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        
      - name: Run Claude Code review
        run: |
          # This is a placeholder - actual Claude Code CLI integration
          # would require Claude Code to be installed and authenticated
          echo "Files changed: ${{ steps.changed-files.outputs.all_changed_files }}"
          echo "Claude review would run here"
          
      - name: Comment PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Claude Code review completed'
            })